services:

  db:
    image: postgres:15
    container_name: iniflex-db
    environment:
      POSTGRES_DB: iniflex_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d iniflex_db"]
      interval: 5s
      timeout: 5s
      retries: 5


  backend:
    build: ./iniflex
    container_name: iniflex-api
    ports:
      - "8080:8080"
    environment:

      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/iniflex_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
    depends_on:
      db:
        condition: service_healthy


  frontend:
    build: ./iniflex-front
    container_name: iniflex-web
    ports:
      - "8081:80"
    depends_on:
      - backend


volumes:
  postgres_data: